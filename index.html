<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bpmf+Zihi+Kai+Std&display=swap"
      rel="stylesheet"
    />
    <title>Unit Conversion</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="header">
      <p class="htxt">Metric/Imperial Unit Conversion</p>
      <input id="ip" type="text" />
      <button id="hbtn">Convert</button>
    </div>
    <div class="body">
      <div class="bdy">
        <div>
          <p class="mf_ptxt">Length (Meter/Feet)</p>
          <p class="mf_ptxt2"></p>
        </div>
      </div>
      <div class="bdy">
        <div>
          <p class="lg_ptxt">Volume (Liters/Gallons)</p>
          <p class="lg_ptxt2"></p>
        </div>
      </div>
      <div class="bdy">
        <div>
          <p class="kp_ptxt">Mass (Kilos/Pounds)</p>
          <p class="kp_ptxt2"></p>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
